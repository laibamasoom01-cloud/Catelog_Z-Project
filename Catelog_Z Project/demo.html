<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catalog-Z Style Loader</title>
    <link rel="stylesheet" href="style.css">
</head>
<style>
  /* Reset */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

/* Page Center */
body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#1f1f1f;
}

/* Loader */
.spinner{
    width:100px;
    height:100px;
    position:relative;
    animation:spin 1.5s linear infinite;
}

.arc{
    position:absolute;
    inset:0;
    border-radius:50%;
    border:4px solid transparent;
}

/* Blue Arc */
.blue{
    border-top-color:#29a3ff;
    transform:rotate(15deg);
}

/* Yellow Arc */
.yellow{
    border-left-color:#ffd400;
    transform:rotate(135deg);
}

/* Red Arc */
.red{
    border-bottom-color:#ff4d4d;
    transform:rotate(255deg);
}

/* Rotation Animation */
@keyframes spin{
    100%{
        transform:rotate(360deg);
    }
}
</style>
<body>

    <div class="spinner">
        <span class="arc blue"></span>
        <span class="arc yellow"></span>
        <span class="arc red"></span>
    </div>

</body>
</html>
